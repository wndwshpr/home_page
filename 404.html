<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindowShopper</title>
    <script>
        // GitHub Pages redirect handling
        const path = window.location.pathname;
        const segments = path.split('/').filter(s => s);
        
        if (segments.length >= 2) {
            if (segments[0] === 's') {
                // Store page
                window.location.replace('/s.html?id=' + segments[1]);
            } else if (segments[0] === 'p') {
                // Product page  
                window.location.replace('/p.html?id=' + segments[1]);
            } else {
                // Default to home
                window.location.replace('/');
            }
        } else {
            // Default to home
            window.location.replace('/');
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
