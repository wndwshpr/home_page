<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindowShopper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: 'Arial Black', Arial, sans-serif;
            background: #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            position: relative;
            padding: max(env(safe-area-inset-top), 3vh) max(env(safe-area-inset-right), 2vw) max(env(safe-area-inset-bottom), 2vh) max(env(safe-area-inset-left), 2vw);
        }
        
        .container {
            text-align: center;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
        }
        
        .corner-star {
            position: fixed;
            font-size: clamp(28px, 4.5vmin, 60px);
            color: black;
            font-weight: normal;
            z-index: 10;
        }
        
        .star-tl { top: max(env(safe-area-inset-top), 3vh); left: max(env(safe-area-inset-left), 3vw); }
        .star-tr { top: max(env(safe-area-inset-top), 3vh); right: max(env(safe-area-inset-right), 3vw); }
        .star-bl { bottom: max(env(safe-area-inset-bottom), 3vh); left: max(env(safe-area-inset-left), 3vw); }
        .star-br { bottom: max(env(safe-area-inset-bottom), 3vh); right: max(env(safe-area-inset-right), 3vw); }
        
        .title {
            font-size: clamp(28px, 6vmin, 80px);
            font-weight: 900;
            letter-spacing: clamp(2px, 0.5vmin, 10px);
            line-height: 1;
            white-space: nowrap;
        }
        
        .image-container {
            width: clamp(180px, 28vmin, 400px);
            height: clamp(180px, 28vmin, 400px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .logo-img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
        }
        
        .subtitle {
            font-size: clamp(22px, 4vmin, 50px);
            font-weight: 900;
            letter-spacing: clamp(2px, 0.4vmin, 8px);
            line-height: 1.2;
            white-space: nowrap;
        }
        
        .download-section {
            display: flex;
            flex-direction: column;
            gap: clamp(10px, 2vmin, 20px);
            align-items: center;
        }
        
        .store-badge {
            display: inline-block;
            width: clamp(220px, 40vmin, 500px);
            height: auto;
        }
        
        .store-badge img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.2s;
        }
        
        .store-badge:hover img {
            transform: scale(1.05);
        }
        
        .ios-coming-soon {
            font-size: clamp(11px, 1.6vmin, 18px);
            font-weight: 400;
            color: rgba(0, 0, 0, 0.5);
            letter-spacing: clamp(0.5px, 0.1vmin, 1.5px);
            font-family: Arial, sans-serif;
            white-space: nowrap;
        }
        
        .nav-links {
            display: flex;
            gap: clamp(10px, 2vmin, 20px);
            align-items: center;
            justify-content: center;
            flex-wrap: nowrap;
        }
        
        .nav-link {
            color: black;
            text-decoration: none;
            font-size: clamp(9px, 1.3vmin, 16px);
            font-weight: 700;
            letter-spacing: clamp(0.5px, 0.15vmin, 2px);
            opacity: 0.6;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        
        .nav-link:hover {
            opacity: 1;
            text-decoration: underline;
        }
        
        .nav-separator {
            opacity: 0.3;
            font-size: clamp(9px, 1.3vmin, 16px);
        }
        
        .footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(10px, 2vmin, 20px);
            flex-wrap: nowrap;
        }
        
        .footer-star {
            font-size: clamp(20px, 3.5vmin, 50px);
            color: black;
        }
        
        .date {
            font-size: clamp(16px, 2.5vmin, 36px);
            font-weight: 900;
            letter-spacing: clamp(1px, 0.3vmin, 5px);
            white-space: nowrap;
        }
        
        /* Ensure everything stays visible on very small screens */
        @media (max-height: 500px) {
            body {
                padding: 2vh 2vw;
            }
            
            .container {
                gap: 0.5vh;
            }
            
            .corner-star {
                font-size: clamp(18px, 3vmin, 40px);
            }
        }
        
        /* Extra small width handling */
        @media (max-width: 400px) {
            .title {
                font-size: clamp(18px, 5vw, 50px);
            }
            
            .subtitle {
                font-size: clamp(14px, 3.5vw, 35px);
            }
        }
    </style>
</head>
<body>
    <div class="corner-star star-tl">★</div>
    <div class="corner-star star-tr">★</div>
    <div class="corner-star star-bl">★</div>
    <div class="corner-star star-br">★</div>
    
    <div class="container">
        <h1 class="title">WindowShopper</h1>
        
        <div class="image-container">
            <img src="logo.png" alt="WindowShopper Logo" class="logo-img">
        </div>
        
        <div class="subtitle">ウィンドウショッパー</div>
        
        <div class="download-section">
            <a href="https://play.google.com/store/apps/details?id=com.windowshopper.smartshopping" class="store-badge" target="_blank" rel="noopener noreferrer">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play">
            </a>
            <p class="ios-coming-soon">iOS version coming soon</p>
        </div>
        
        <div class="nav-links">
            <a href="/privacy-policy.html" class="nav-link">PRIVACY POLICY</a>
            <span class="nav-separator">•</span>
            <a href="/terms-of-service.html" class="nav-link">TERMS OF SERVICE</a>
            <span class="nav-separator">•</span>
            <a href="/data-deletion.html" class="nav-link">DATA DELETION</a>
        </div>
        
        <div class="footer">
            <div class="footer-star">★</div>
            <div class="date">EST 2025</div>
            <div class="footer-star">★</div>
        </div>
    </div>
</body>
</html>
