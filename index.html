<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindowShopper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial Black', Arial, sans-serif;
            background: #e8e8e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            position: relative;
        }
        
        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        
        .corner-star {
            position: fixed;
            font-size: 60px;
            color: black;
            font-weight: normal;
        }
        
        .star-tl { top: 40px; left: 40px; }
        .star-tr { top: 40px; right: 40px; }
        .star-bl { bottom: 40px; left: 40px; }
        .star-br { bottom: 40px; right: 40px; }
        
        .title {
            font-size: 60px;
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 40px;
            line-height: 1;
            text-align: center;
            width: 100%;
        }
        
        .image-container {
            width: 400px;
            height: 400px;
            margin: 0 auto 40px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
        }
        
        .logo-img {
            max-width: 350px;
            max-height: 350px;
            width: auto;
            height: auto;
        }
        
        .subtitle {
            font-size: 40px;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 80px;
            line-height: 1;
        }
        
        .nav-links {
            margin-bottom: 80px;
        }
        
        .nav-link {
            display: block;
            color: black;
            text-decoration: none;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        
        .nav-link:hover {
            text-decoration: underline;
        }
        
        .footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        
        .footer-star {
            font-size: 60px;
            color: black;
        }
        
        .date {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 4px;
        }
        
        @media (max-width: 768px) {
            .title { font-size: 36px; letter-spacing: 4px; }
            .image-container { width: 280px; height: 280px; }
            .logo-img { max-width: 250px; max-height: 250px; }
            .subtitle { font-size: 24px; letter-spacing: 3px; }
            .nav-link { font-size: 20px; letter-spacing: 2px; }
            .date { font-size: 20px; letter-spacing: 2px; }
            .corner-star, .footer-star { font-size: 40px; }
        }
    </style>
</head>
<body>
    <div class="corner-star star-tl">★</div>
    <div class="corner-star star-tr">★</div>
    <div class="corner-star star-bl">★</div>
    <div class="corner-star star-br">★</div>
    
    <div class="container">
        <h1>WindowShopper</h1>
        
        <div class="image-container">
            <img src="logo.png" alt="WindowShopper Logo" class="logo-img">
        </div>
        
        <div class="subtitle">ウィンドウショッパー<br></div>
        
        
        <div class="nav-links">
            <a href="./privacy-policy.html" class="nav-link">PRIVACY POLICY</a>
            <a href="./terms-of-service.html" class="nav-link">TERMS OF SERVICE</a>
            <a href="./data-deletion.html" class="nav-link">DATA DELETION</a>
        </div>
        
        <div class="footer">
            <div class="footer-star">★</div>
            <div class="date">EST 2025</div>
            <div class="footer-star">★</div>
        </div>
    </div>
</body>
    
</html>
